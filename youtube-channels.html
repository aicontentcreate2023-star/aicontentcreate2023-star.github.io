        function getYouTubeURL(handle) {
            return `https://www.youtube.com/@${handle}`;
        }

        function renderChannels() {
            const categoriesContainer = document.getElementById('categories');
            categoriesContainer.innerHTML = '';
            
            let totalCount = 0;
            channelsData.forEach(category => {
                totalCount += category.channels.length;
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.dataset.category = category.category;
                
                const channelsHTML = category.channels.map(channel => {
                    const tagsHTML = channel.tags ? 
                        `<div class="channel-tags">${channel.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>` : '';
                    
                    const detailHTML = channel.detail ? 
                        `<div class="channel-detail">${channel.detail}</div>` : '';
                    
                    return `
                        <a href="${getYouTubeURL(channel.handle)}" target="_blank" rel="noopener noreferrer" class="channel-card ${channel.popular ? 'popular' : ''}" data-name="${channel.name}" data-desc="${channel.desc} ${channel.detail || ''}">
                            <div class="channel-name">${channel.name}</div>
                            <div class="channel-desc">${channel.desc}</div>
                            ${detailHTML}
                            ${tagsHTML}
                            <div class="youtube-link">🔗 前往 YouTube →</div>
                        </a>
                    `;
                }).join('');
                
                categoryDiv.innerHTML = `
                    <div class="category-header">
                        <span class="category-icon">${category.icon}</span>
                        <h2 class="category-title">${category.category}</h2>
                        <span class="category-count">${category.channels.length} 个</span>
                    </div>
                    <div class="channels-grid">
                        ${channelsHTML}
                    </div>
                `;
                
                categoriesContainer.appendChild(categoryDiv);
            });
            
            document.getElementById('totalChannels').textContent = totalCount;
        }

        function searchChannels() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categories = document.querySelectorAll('.category');
            const noResults = document.getElementById('noResults');
            let hasResults = false;
            
            categories.forEach(category => {
                const cards = category.querySelectorAll('.channel-card');
                let categoryHasVisible = false;
                
                cards.forEach(card => {
                    const name = card.dataset.name.toLowerCase();
                    const desc = card.dataset.desc.toLowerCase();
                    
                    if (name.includes(searchTerm) || desc.includes(searchTerm)) {
                        card.style.display = 'block';
                        categoryHasVisible = true;
                        hasResults = true;
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                if (categoryHasVisible) {
                    category.classList.remove('hidden');
                } else {
                    category.classList.add('hidden');
                }
            });
            
            if (hasResults) {
                noResults.classList.add('hidden');
            } else {
                noResults.classList.remove('hidden');
            }
        }

        document.getElementById('searchInput').addEventListener('input', searchChannels);
        
        renderChannels();
    </script>
