             features: ["杉林挑戰區（六個闖關關卡）","平衡木橋、攀爬木頭架、攀爬網","多達15種以上設施","山訓特色遊戲場","小木屋戲沙池"],
             highlight: "以陸軍500障礙賽為主題！山訓特色兒童遊戲場，讓孩子藉由玩樂訓練體能。園區內滿滿的綠杉，還有純白夢幻五星級廁所。", transport: "龍潭區中正路三林段"},
            {number: 13, name: "楓樹腳公園", area: "八德區",
             images: Array.from({length:5}, (_,i) => ({src: `images/taoyuan-parks/13-fengshu-${i+1}.jpg`, source: "https://bobowin.blog/taoyuan-maple-foot/", credit: "寶寶溫旅行親子生活"})),
             address: "桃園市八德區金鎰街14巷", hours: "24小時", parking: "路邊停車",
             features: ["長頸鹿遊戲塔（四層樓高）","超高滑道旋轉溜滑梯（最高16M）","鏤空攀爬網、空中懸空式爬籠","滑索","大草原及樹群"],
             highlight: "全國第一處以長頸鹿為主題大型遊戲塔！四層樓高，以「城市動物園」為發想。桃園七大旗艦公園之一（最後完成）。", transport: "八德區金鎰街"},
            {number: 16, name: "新勢公園", area: "平鎮區",
             images: Array.from({length:5}, (_,i) => ({src: `images/taoyuan-parks/16-xinshi-${i+1}.jpg`, source: "https://bobowin.blog/xinshi-park/", credit: "寶寶溫旅行親子生活"})),
             address: "桃園市平鎮區中原路58號", hours: "24小時", parking: "路邊停車",
             features: ["海洋風兒童遊戲場","3米高彩繪造型山丘（魚和海龜主題）","溜滑梯滑入白沙坑","迷你挖土機、玩沙平台","360度旋轉鞦韆"],
             highlight: "海洋河川主題山丘地景！可愛的魚和海龜造型，彷彿置身海底世界。超大草地可野餐，喜歡攀爬玩沙的孩子別錯過。", transport: "靠近老街溪"}
        ];
        
        function createSlider(images, parkId) {
            if (!images || images.length === 0) return '';
            
            const sliderHTML = `
                <div class="park-images-slider" id="slider-${parkId}">
                    <div class="slider-container">
                        ${images.map(img => `<img src="${img.src}" alt="公園照片" onerror="this.style.display='none'">`).join('')}
                    </div>
                    ${images.length > 1 ? `
                        <button class="slider-prev" onclick="moveSlider(${parkId}, -1)">‹</button>
                        <button class="slider-next" onclick="moveSlider(${parkId}, 1)">›</button>
                        <div class="slider-dots">
                            ${images.map((_, i) => `<span class="dot ${i===0?'active':''}" onclick="goToSlide(${parkId}, ${i})"></span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="image-source">
                        📷 照片來源：<a href="${images[0].source}" target="_blank">${images[0].credit}</a>
                    </div>
                </div>
            `;
            return sliderHTML;
        }
        
        let currentSlides = {};
        
        function moveSlider(parkId, direction) {
            const slider = document.querySelector(`#slider-${parkId} .slider-container`);
            const dots = document.querySelectorAll(`#slider-${parkId} .dot`);
            const totalSlides = dots.length;
            
            if (!currentSlides[parkId]) currentSlides[parkId] = 0;
            
            currentSlides[parkId] = (currentSlides[parkId] + direction + totalSlides) % totalSlides;
            slider.style.transform = `translateX(-${currentSlides[parkId] * 100}%)`;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlides[parkId]);
            });
        }
        
        function goToSlide(parkId, index) {
            const slider = document.querySelector(`#slider-${parkId} .slider-container`);
            const dots = document.querySelectorAll(`#slider-${parkId} .dot`);
            
            currentSlides[parkId] = index;
            slider.style.transform = `translateX(-${index * 100}%)`;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }
        
        function renderParks(filteredParks = parksData) {
            const grid = document.getElementById('parksGrid');
            grid.innerHTML = '';
            
            filteredParks.forEach(park => {
                const card = `
                    <div class="park-card" data-area="${park.area}">
                        ${createSlider(park.images, park.number)}
                        <div class="park-header">
                            <span class="park-number">NO.${park.number}</span>
                            <div class="park-title">${park.name}</div>
                            <div class="park-location">📍 ${park.area}</div>
                        </div>
                        <div class="park-body">
                            <div class="info-item">
                                <div class="info-label">地址</div>
                                <div class="info-content">${park.address}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">開放時間</div>
                                <div class="info-content">${park.hours}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">停車資訊</div>
                                <div class="info-content">${park.parking}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">遊戲設施</div>
                                <ul class="features-list">
                                    ${park.features.map(f => `<li>${f}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="highlight">
                                <strong>✨ 特色亮點</strong><br>
                                ${park.highlight}
                            </div>
                            ${park.transport ? `
                            <div class="info-item">
                                <div class="info-label">交通方式</div>
                                <div class="info-content">${park.transport}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }
        
        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const area = this.dataset.area;
                if (area === 'all') {
                    renderParks(parksData);
                } else {
                    const filtered = parksData.filter(p => p.area === area);
                    renderParks(filtered);
                }
            });
        });
        
        // Initial render
        renderParks();
    </script>
</body>
</html>
